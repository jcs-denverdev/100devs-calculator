<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>100Devs Calculator</title>
</head>
<body>
    <section class="calc-bg calc-body">
        <section>
            <section class="num-display">
                <p id="display-text"></p>
            </section>
            <section class="num-pad">
                <div class="button" id="seven">
                    <h3>7</h3>
                </div>
                <div class="button" id="eight">
                    <h3>8</h3>
                </div>
                <div class="button" id="nine">
                    <h3>9</h3>
                </div>
                <div class="button" id="divide">
                    <h3>/</h3>
                </div>
                <div class="button" id="four">
                    <h3>4</h3>
                </div>
                <div class="button" id="five">
                    <h3>5</h3>
                </div>
                <div class="button" id="six">
                    <h3>6</h3>
                </div>
                <div class="button" id="multiply">
                    <h3>x</h3>
                </div>
                <div class="button" id="one">
                    <h3>1</h3>
                </div>
                <div class="button" id="two">
                    <h3>2</h3>
                </div>
                <div class="button" id="three">
                    <h3>3</h3>
                </div>
                <div class="button" id="add">
                    <h3>+</h3>
                </div>
                <div class="button" id="zero">
                    <h3>0</h3>
                </div>
                <div class="button" id="decimal">
                    <h3>.</h3>
                </div>
                <div class="button" id="equals">
                    <h3>=</h3>
                </div>
                <div class="button" id="subtract">
                    <h3>-</h3>
                </div>
            </section>
        </section>
    </section>
</body>
</html>
